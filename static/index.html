<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain Finder</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --surface2: #1a2234;
      --border: #1e2d45;
      --text: #e2e8f0;
      --muted: #8896ab;
      --accent: #6366f1;
      --accent-glow: #818cf8;
      --green: #34d399;
      --green-bg: rgba(52,211,153,.12);
      --red: #f87171;
      --red-bg: rgba(248,113,113,.08);
      --yellow: #fbbf24;
      --yellow-bg: rgba(251,191,36,.10);
      --radius: 10px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: var(--accent-glow); text-decoration: none; }

    /* ── Layout ────────────────────────────────────────────── */
    .app { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }

    header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2rem;
    }
    header .logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: grid; place-items: center;
      font-weight: 800; font-size: 1.1rem; color: #fff;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header h1 span { color: var(--muted); font-weight: 400; font-size: .9rem; margin-left: .5rem; }

    /* ── Cards ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card-title {
      font-size: .8rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: .75rem;
    }

    /* ── Keywords section ──────────────────────────────────── */
    .keywords-area { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .75rem; }
    .kw-tag {
      display: inline-flex; align-items: center; gap: .35rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: .25rem .6rem;
      font-size: .8rem; color: var(--text); cursor: default;
      transition: .15s;
    }
    .kw-tag:hover { border-color: var(--red); }
    .kw-tag .remove {
      cursor: pointer; opacity: .5; font-size: .7rem;
      transition: .15s;
    }
    .kw-tag:hover .remove { opacity: 1; color: var(--red); }

    .kw-input-row { display: flex; gap: .5rem; }
    .kw-input-row input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: .5rem .75rem;
      color: var(--text); font-size: .85rem; outline: none;
      transition: border .2s;
    }
    .kw-input-row input:focus { border-color: var(--accent); }
    .kw-input-row input::placeholder { color: var(--muted); }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .55rem 1.1rem; border-radius: 8px; border: none;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: .2s;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: var(--accent-glow); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-sm { padding: .35rem .7rem; font-size: .78rem; }

    .actions-row {
      display: flex; gap: .5rem; align-items: center; flex-wrap: wrap;
    }

    /* ── Progress ──────────────────────────────────────────── */
    .progress-wrap { display: none; margin-bottom: 1.25rem; }
    .progress-wrap.active { display: block; }
    .progress-bar-track {
      height: 6px; background: var(--surface2); border-radius: 3px;
      overflow: hidden; margin-bottom: .5rem;
    }
    .progress-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), #a855f7);
      border-radius: 3px;
      transition: width .15s;
    }
    .progress-stats {
      display: flex; gap: 1.5rem; font-size: .8rem; color: var(--muted);
    }
    .progress-stats strong { color: var(--text); }

    /* ── Filters ───────────────────────────────────────────── */
    .filters { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-chip {
      padding: .3rem .75rem; border-radius: 20px; font-size: .78rem;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); cursor: pointer; transition: .15s;
      font-weight: 500;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--text); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .search-row { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .search-row input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: .5rem .75rem;
      color: var(--text); font-size: .85rem; outline: none;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }

    /* ── Table ─────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse; font-size: .85rem;
    }
    thead th {
      text-align: left; padding: .6rem .75rem;
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted);
      border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: var(--text); }
    thead th .sort-arrow { margin-left: .3rem; font-size: .65rem; }
    tbody tr {
      border-bottom: 1px solid rgba(30,45,69,.5);
      transition: background .1s;
    }
    tbody tr:hover { background: rgba(99,102,241,.05); }
    td { padding: .55rem .75rem; white-space: nowrap; }
    td.domain-name {
      font-family: var(--mono); font-weight: 600; font-size: .9rem;
    }
    td .word-chip {
      display: inline-block; padding: .1rem .45rem; border-radius: 4px;
      font-size: .72rem; background: var(--surface2); margin-right: .25rem;
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .15rem .55rem; border-radius: 20px;
      font-size: .75rem; font-weight: 600;
    }
    .status-badge.available { background: var(--green-bg); color: var(--green); }
    .status-badge.registered { background: var(--red-bg); color: var(--red); }
    .status-badge.unknown { background: var(--yellow-bg); color: var(--yellow); }
    .status-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }

    .score-bar {
      display: inline-flex; align-items: center; gap: .4rem;
    }
    .score-bar .bar {
      width: 50px; height: 5px; background: var(--surface2);
      border-radius: 3px; overflow: hidden;
    }
    .score-bar .bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), #a855f7);
    }

    .empty-state {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
    }
    .empty-state p { margin-bottom: .5rem; }

    /* ── Counters ──────────────────────────────────────────── */
    .result-counters {
      display: flex; gap: 1rem; margin-bottom: 1rem; font-size: .82rem;
    }
    .counter-item {
      display: flex; align-items: center; gap: .35rem; color: var(--muted);
    }
    .counter-item strong { color: var(--text); font-size: 1rem; }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .app { padding: 1rem; }
      header h1 { font-size: 1.2rem; }
      .kw-input-row { flex-direction: column; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">D</div>
    <h1>Domain Finder <span>by keyword combos</span></h1>
  </header>

  <!-- Keywords Card -->
  <div class="card">
    <div class="card-title">Keywords</div>
    <div class="keywords-area" id="keywordsArea"></div>
    <div class="kw-input-row">
      <input type="text" id="kwInput" placeholder="Add keywords (comma-separated)…" />
      <button class="btn btn-secondary btn-sm" onclick="addKeywords()">Add</button>
      <button class="btn btn-secondary btn-sm" onclick="resetKeywords()">Reset</button>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions-row" style="margin-bottom:1.25rem;">
    <button class="btn btn-primary" id="startBtn" onclick="startCheck()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 12l2 2 4-4"/></svg>
      Generate &amp; Check Domains
    </button>
    <button class="btn btn-secondary btn-sm" id="stopBtn" style="display:none" onclick="stopCheck()">Stop</button>
    <span id="kwCount" style="font-size:.82rem;color:var(--muted);"></span>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-stats">
      <span>Checked <strong id="checkedCount">0</strong> / <strong id="totalCount">0</strong></span>
      <span>Available <strong id="availCount" style="color:var(--green)">0</strong></span>
      <span>Registered <strong id="regCount" style="color:var(--red)">0</strong></span>
    </div>
  </div>

  <!-- Results Card -->
  <div class="card" id="resultsCard" style="display:none;">
    <div class="card-title">Results</div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search domains…" oninput="renderTable()" />
    </div>

    <div class="filters" id="filtersRow">
      <span class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">All</span>
      <span class="filter-chip" data-filter="available" onclick="setFilter('available',this)">Available</span>
      <span class="filter-chip" data-filter="registered" onclick="setFilter('registered',this)">Registered</span>
      <span class="filter-chip" data-filter="unknown" onclick="setFilter('unknown',this)">Unknown</span>
    </div>

    <div class="result-counters" id="resultCounters"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('rank')">Rank <span class="sort-arrow" id="sort-rank"></span></th>
            <th onclick="sortBy('domain')">Domain <span class="sort-arrow" id="sort-domain"></span></th>
            <th onclick="sortBy('score')">Score <span class="sort-arrow" id="sort-score"></span></th>
            <th onclick="sortBy('status')">Status <span class="sort-arrow" id="sort-status"></span></th>
            <th>Words</th>
            <th onclick="sortBy('length')">Length <span class="sort-arrow" id="sort-length"></span></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <p>No domains match your filters.</p>
    </div>
  </div>

</div>

<script>
// ── Default keywords ──────────────────────────────────────────────────
const DEFAULT_KEYWORDS = [
  "base","feed","trading","view","alpha","market","prime","signal","trace",
  "radar","mosaic","intel","forge","flow","iq","alphawatch","tower","guru",
  "nova","sage","zen","sparta","quant","live","news","watch","echo","shadow",
  "ghost","lab","x","ray","constellation","star","qube","lead","track","idea",
  "observer","horizon","feat","tech","ai","digest","insight","pulse","core",
  "nexus","matrix","vantage","apex","asphalt","catalyst","cortex","echelon",
  "elevate","fusion","genesis","helix","infinity","keystone","lighthouse",
  "momentum","odyssey","revolution","spectrum","titan","velocity","zenith",
  "vortex","warp","xenon","sig","al","alyx","yx","zeta","omega","delta",
  "sigma","kappa","lambda","theta","phi","chi","way","edge","vista","ster",
  "ify","ium","ex","exy","nix","onyx","vibe","vibes","vibez","xy","all",
  "road","water","bridge","sky","cloud","in","meta","abc","hyper","scale"
];

let keywords = [...DEFAULT_KEYWORDS];
let results = [];
let ws = null;
let currentFilter = "all";
let sortCol = "score";
let sortDir = -1; // descending
let total = 0;
let availableCount = 0;
let registeredCount = 0;

// ── Keyword Management ────────────────────────────────────────────────
function renderKeywords() {
  const area = document.getElementById("keywordsArea");
  // De-dup for display
  const unique = [...new Set(keywords.map(k => k.trim().toLowerCase()).filter(Boolean))];
  keywords = unique;
  area.innerHTML = unique.map(k =>
    `<span class="kw-tag">${k}<span class="remove" onclick="removeKeyword('${k}')">&times;</span></span>`
  ).join("");
  document.getElementById("kwCount").textContent = `${unique.length} keywords`;
}

function removeKeyword(word) {
  keywords = keywords.filter(k => k !== word);
  renderKeywords();
}

function addKeywords() {
  const input = document.getElementById("kwInput");
  const newWords = input.value.split(",").map(w => w.trim().toLowerCase()).filter(Boolean);
  keywords = [...new Set([...keywords, ...newWords])];
  input.value = "";
  renderKeywords();
}

function resetKeywords() {
  keywords = [...DEFAULT_KEYWORDS];
  renderKeywords();
}

document.getElementById("kwInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addKeywords();
});

// ── WebSocket Check ───────────────────────────────────────────────────
function startCheck() {
  results = [];
  availableCount = 0;
  registeredCount = 0;
  total = 0;

  document.getElementById("startBtn").disabled = true;
  document.getElementById("stopBtn").style.display = "";
  document.getElementById("progressWrap").classList.add("active");
  document.getElementById("resultsCard").style.display = "";
  document.getElementById("tableBody").innerHTML = "";
  document.getElementById("checkedCount").textContent = "0";
  document.getElementById("totalCount").textContent = "…";
  document.getElementById("availCount").textContent = "0";
  document.getElementById("regCount").textContent = "0";
  document.getElementById("progressFill").style.width = "0%";

  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws/check`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ keywords }));
  };

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);

    if (msg.type === "init") {
      total = msg.total;
      document.getElementById("totalCount").textContent = total;
    }

    if (msg.type === "result") {
      results.push(msg.item);
      if (msg.item.status === "available") availableCount++;
      if (msg.item.status === "registered") registeredCount++;

      document.getElementById("checkedCount").textContent = msg.checked;
      document.getElementById("availCount").textContent = availableCount;
      document.getElementById("regCount").textContent = registeredCount;
      document.getElementById("progressFill").style.width =
        `${Math.round((msg.checked / total) * 100)}%`;

      // Live-update table every 10 results for performance
      if (results.length % 10 === 0 || results.length < 30) {
        renderTable();
      }
    }

    if (msg.type === "done") {
      onDone();
    }

    if (msg.type === "error") {
      onDone();
      alert("Error: " + msg.message);
    }
  };

  ws.onclose = () => onDone();
}

function stopCheck() {
  if (ws) ws.close();
  onDone();
}

function onDone() {
  document.getElementById("startBtn").disabled = false;
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("progressFill").style.width = "100%";
  renderTable();
}

// ── Filtering & Sorting ──────────────────────────────────────────────
function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderTable();
}

function sortBy(col) {
  if (sortCol === col) {
    sortDir *= -1;
  } else {
    sortCol = col;
    sortDir = col === "domain" ? 1 : -1;
  }
  // Update arrows
  document.querySelectorAll(".sort-arrow").forEach(s => s.textContent = "");
  const arrow = document.getElementById(`sort-${col}`);
  if (arrow) arrow.textContent = sortDir === 1 ? "▲" : "▼";
  renderTable();
}

function renderTable() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  let filtered = results.filter(r => {
    if (currentFilter !== "all" && r.status !== currentFilter) return false;
    if (search && !r.domain.includes(search) && !r.word1.includes(search) && !r.word2.includes(search)) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    let va, vb;
    switch (sortCol) {
      case "rank": va = a.score; vb = b.score; break;
      case "domain": va = a.domain; vb = b.domain; break;
      case "score": va = a.score; vb = b.score; break;
      case "status": va = a.status; vb = b.status; break;
      case "length": va = a.name.length; vb = b.name.length; break;
      default: va = a.score; vb = b.score;
    }
    if (typeof va === "string") return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });

  // Re-rank after filter
  filtered.forEach((r, i) => r._rank = i + 1);

  // Counters
  const allCount = results.length;
  const avail = results.filter(r => r.status === "available").length;
  const reg = results.filter(r => r.status === "registered").length;
  const unk = results.filter(r => r.status === "unknown").length;
  document.getElementById("resultCounters").innerHTML = `
    <span class="counter-item"><strong>${allCount}</strong> total</span>
    <span class="counter-item"><strong style="color:var(--green)">${avail}</strong> available</span>
    <span class="counter-item"><strong style="color:var(--red)">${reg}</strong> registered</span>
    <span class="counter-item"><strong style="color:var(--yellow)">${unk}</strong> unknown</span>
    <span class="counter-item"><strong>${filtered.length}</strong> shown</span>
  `;

  const tbody = document.getElementById("tableBody");
  const empty = document.getElementById("emptyState");

  if (filtered.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "";
    return;
  }
  empty.style.display = "none";

  // Max score for bar scaling
  const maxScore = Math.max(...results.map(r => r.score), 1);

  tbody.innerHTML = filtered.map(r => {
    const statusClass = r.status === "available" ? "available"
      : r.status === "registered" ? "registered" : "unknown";
    const pct = Math.max(0, Math.round((r.score / maxScore) * 100));
    return `<tr>
      <td>${r._rank}</td>
      <td class="domain-name">${r.domain}</td>
      <td>
        <span class="score-bar">
          <span class="bar"><span class="bar-fill" style="width:${pct}%"></span></span>
          ${r.score}
        </span>
      </td>
      <td><span class="status-badge ${statusClass}"><span class="dot"></span>${r.status}</span></td>
      <td><span class="word-chip">${r.word1}</span><span class="word-chip">${r.word2}</span></td>
      <td>${r.name.length}</td>
    </tr>`;
  }).join("");
}

// ── Init ──────────────────────────────────────────────────────────────
renderKeywords();
sortBy("score");
</script>
</body>
</html>
